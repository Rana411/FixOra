<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schedule - Fixora</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        .schedule-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 12px;
        }
        .schedule-item:last-child { border-bottom: none; }
        .schedule-time {
            background: var(--gradient-primary);
            color: white;
            padding: 6px 16px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            min-width: 80px;
            text-align: center;
        }
        .schedule-info h4 {
            color: var(--text-primary);
            margin: 0;
        }
        .schedule-info p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin: 2px 0 0;
        }
        .schedule-location {
            color: var(--text-light);
            font-size: 0.85rem;
        }
        .schedule-location i {
            color: var(--accent);
        }

        .day-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .day-tab {
            padding: 10px 24px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg-primary);
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
        }
        .day-tab:hover,
        .day-tab.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(102, 126, 234, 0.08);
        }
        .day-tab.active {
            background: var(--accent);
            color: white;
        }

        .schedule-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-mini {
            background: var(--bg-card);
            padding: 16px;
            border-radius: var(--radius-sm);
            text-align: center;
            border: 1px solid var(--border);
        }
        .stat-mini h3 {
            color: var(--text-primary);
            font-size: 1.4rem;
            margin: 0;
        }
        .stat-mini p {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin: 4px 0 0;
        }
    </style>
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-wrench"></i>
                <span>Fix<span class="logo-highlight">ora</span></span>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="../html/provider-dashboard.html"><i class="fas fa-gauge-high"></i> Dashboard</a></li>
                <li><a href="../html/orders.html"><i class="fas fa-list-check"></i> Orders</a></li>
                <li><a href="../html/schedule.html" class="active"><i class="fas fa-calendar-days"></i> Schedule</a></li>
                <li><a href="../html/profile.html"><i class="fas fa-user-gear"></i> Profile</a></li>
                <li id="authLink"><a href="../html/login.html" onclick="handleLogout(event)"><i class="fas fa-right-from-bracket"></i> Logout</a></li>
            </ul>
            <div class="nav-actions">
                <button id="theme-toggle" class="theme-btn">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="hamburger" id="hamburger">
                    <i class="fas fa-bars"></i>
                </div>
            </div>
        </div>
    </nav>

    <!-- ===== MAIN ===== -->
    <main class="main-content">
        <div class="container">
            <h1 class="page-title">
                <i class="fas fa-calendar-days"></i> Schedule
            </h1>

            <!-- Stats -->
            <div class="schedule-stats">
                <div class="stat-mini">
                    <h3 id="todayJobs">0</h3>
                    <p>Today's Jobs</p>
                </div>
                <div class="stat-mini">
                    <h3 id="weekJobs">0</h3>
                    <p>This Week</p>
                </div>
                <div class="stat-mini">
                    <h3 id="monthJobs">0</h3>
                    <p>This Month</p>
                </div>
            </div>

            <!-- Day Tabs -->
            <div class="day-tabs" id="dayTabs">
                <button class="day-tab active" data-day="today">Today</button>
                <button class="day-tab" data-day="tomorrow">Tomorrow</button>
                <button class="day-tab" data-day="wed">Wed</button>
                <button class="day-tab" data-day="thu">Thu</button>
                <button class="day-tab" data-day="fri">Fri</button>
            </div>

            <!-- Schedule List -->
            <div style="background: var(--bg-card); border-radius: var(--radius); padding: 24px 28px; box-shadow: var(--shadow); border: 1px solid var(--border);">
                <div id="scheduleList">
                    <!-- Rows will be inserted by JavaScript -->
                </div>
            </div>
        </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <p>© 2026 <strong>Fixora</strong> — Professional Home Repair Services</p>
        <p class="footer-update">Last updated: <span id="footer-date"></span></p>
    </footer>

    <script src="../js/script.js"></script>
    <script>
        // ===== SCHEDULE DATA =====
        const scheduleData = {
            'today': [
                { time: '09:00 AM', customer: 'Ahmed Al-Saud', service: 'Plumbing', location: 'Al-Malaz, Riyadh' },
                { time: '11:30 AM', customer: 'Mohammed Al-Otaibi', service: 'AC Repair', location: 'Al-Narjis, Riyadh' },
                { time: '02:00 PM', customer: 'Sultan Al-Ghamdi', service: 'Painting', location: 'Al-Rawdah, Riyadh' },
                { time: '04:30 PM', customer: 'Nora Al-Fahd', service: 'Carpentry', location: 'Al-Mughrizat, Riyadh' },
            ],
            'tomorrow': [
                { time: '10:00 AM', customer: 'Fatima Al-Zahra', service: 'Electrical', location: 'Al-Sulaimaniyah, Riyadh' },
                { time: '01:00 PM', customer: 'Khalid Al-Saud', service: 'Plumbing', location: 'Al-Malaz, Riyadh' },
                { time: '03:30 PM', customer: 'Maha Al-Otaibi', service: 'AC Repair', location: 'Al-Narjis, Riyadh' },
            ],
            'wed': [
                { time: '08:30 AM', customer: 'Faisal Al-Ghamdi', service: 'Carpentry', location: 'Al-Rawdah, Riyadh' },
                { time: '12:00 PM', customer: 'Layla Al-Zahra', service: 'Electrical', location: 'Al-Sulaimaniyah, Riyadh' },
                { time: '05:00 PM', customer: 'Saud Al-Fahd', service: 'Painting', location: 'Al-Mughrizat, Riyadh' },
            ],
            'thu': [
                { time: '09:30 AM', customer: 'Nora Al-Saud', service: 'Plumbing', location: 'Al-Malaz, Riyadh' },
                { time: '02:30 PM', customer: 'Ahmed Al-Otaibi', service: 'AC Repair', location: 'Al-Narjis, Riyadh' },
            ],
            'fri': [
                { time: '10:00 AM', customer: 'Mohammed Al-Zahra', service: 'Electrical', location: 'Al-Sulaimaniyah, Riyadh' },
                { time: '01:30 PM', customer: 'Sultan Al-Fahd', service: 'Carpentry', location: 'Al-Mughrizat, Riyadh' },
                { time: '04:00 PM', customer: 'Fatima Al-Ghamdi', service: 'Painting', location: 'Al-Rawdah, Riyadh' },
            ]
        };

        let currentDay = 'today';

        // ===== RENDER SCHEDULE =====
        function renderSchedule(day) {
            const container = document.getElementById('scheduleList');
            const items = scheduleData[day] || [];

            // Update stats
            document.getElementById('todayJobs').textContent = scheduleData.today.length || 0;
            const totalWeek = scheduleData.today.length + scheduleData.tomorrow.length + scheduleData.wed.length + scheduleData.thu.length + scheduleData.fri.length;
            document.getElementById('weekJobs').textContent = totalWeek || 0;
            document.getElementById('monthJobs').textContent = totalWeek * 4 || 0;

            if (items.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 40px 20px; color: var(--text-light);">
                        <i class="fas fa-calendar-xmark" style="font-size: 2.5rem; display: block; margin-bottom: 12px;"></i>
                        <p style="font-weight: 600;">No jobs scheduled for this day</p>
                    </div>
                `;
                return;
            }

            let html = '';
            items.forEach(item => {
                const icon = {
                    'Plumbing': 'fa-faucet',
                    'Electrical': 'fa-bolt',
                    'AC Repair': 'fa-snowflake',
                    'Carpentry': 'fa-hammer',
                    'Painting': 'fa-paint-roller',
                }[item.service] || 'fa-wrench';

                html += `
                    <div class="schedule-item">
                        <div style="display: flex; align-items: center; gap: 16px; flex-wrap: wrap;">
                            <span class="schedule-time">${item.time}</span>
                            <div class="schedule-info">
                                <h4>${item.customer}</h4>
                                <p><i class="fas ${icon}" style="color: var(--accent);"></i> ${item.service}</p>
                            </div>
                        </div>
                        <div class="schedule-location">
                            <i class="fas fa-location-dot"></i> ${item.location}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // ===== DAY TABS =====
        document.querySelectorAll('.day-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentDay = this.dataset.day;
                renderSchedule(currentDay);
            });
        });

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', function() {
            const role = localStorage.getItem('userRole');
            if (role !== 'provider') {
                window.location.href = 'login.html';
            }
            renderSchedule('today');
        });
    </script>
</body>
</html>
