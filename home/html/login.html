<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Emergency Plan</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        /* ===== LOGIN PAGE SPECIFIC STYLES ===== */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            padding: 20px;
        }

        .login-container {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 50px 45px;
            max-width: 440px;
            width: 100%;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: background 0.4s, box-shadow 0.4s;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 300px;
            height: 300px;
            background: var(--gradient-primary);
            opacity: 0.05;
            border-radius: 50%;
            pointer-events: none;
        }

        .login-header {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
            z-index: 1;
        }

        .login-header .logo-icon {
            font-size: 3rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .login-header h1 {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .login-form {
            position: relative;
            z-index: 1;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .form-group .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-group .input-wrapper .input-icon {
            position: absolute;
            left: 16px;
            color: var(--text-light);
            font-size: 1rem;
            transition: 0.3s;
            pointer-events: none;
        }

        .form-group .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: var(--transition);
            outline: none;
        }

        .form-group .input-wrapper input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        }

        .form-group .input-wrapper input:focus ~ .input-icon {
            color: var(--accent);
        }

        /* ===== PASSWORD TOGGLE BUTTON ===== */
        .password-toggle {
            position: absolute;
            right: 16px;
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 8px;
            transition: var(--transition);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle:hover {
            color: var(--accent);
            background: rgba(102, 126, 234, 0.08);
        }

        .password-toggle:active {
            transform: scale(0.9);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .form-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .form-options label input[type="checkbox"] {
            accent-color: var(--accent);
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .form-options a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .form-options a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.5);
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            position: relative;
            z-index: 1;
        }

        .login-footer p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .login-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }

        .login-footer a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        .social-login {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .social-login a {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: var(--transition);
            font-size: 1.2rem;
            text-decoration: none;
        }

        .social-login a:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 20px 0 24px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            color: var(--text-light);
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .login-container {
                padding: 35px 25px;
            }

            .login-header h1 {
                font-size: 1.5rem;
            }

            .form-options {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        /* ===== ERROR MESSAGE ===== */
        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .error-message.show {
            display: flex;
        }

        .error-message i {
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-container">

            <!-- Header -->
            <div class="login-header">
                <div class="logo-icon">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <h1>Welcome Back</h1>
                <p>Sign in to manage your emergency plan</p>
            </div>

            <!-- Login Form -->
            <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                
                <!-- Error Message -->
                <div class="error-message" id="errorMessage">
                    <i class="fas fa-circle-exclamation"></i>
                    <span id="errorText">Invalid email or password</span>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="you@example.com" required />
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                </div>

                <!-- Password with Toggle Button -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required />
                        <i class="fas fa-lock input-icon"></i>
                        <!-- زر إظهار/إخفاء كلمة المرور -->
                        <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Options -->
                <div class="form-options">
                    <label>
                        <input type="checkbox" id="rememberMe" checked />
                        Remember me
                    </label>
                    <a href="#">Forgot password?</a>
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn-login">
                    <i class="fas fa-arrow-right-to-bracket"></i>
                    Sign In
                </button>

                <!-- Divider -->
                <div class="divider">
                    <span>or continue with</span>
                </div>

                <!-- Social Login -->
                <div class="social-login">
                    <a href="#" title="Google">
                        <i class="fab fa-google"></i>
                    </a>
                    <a href="#" title="Apple">
                        <i class="fab fa-apple"></i>
                    </a>
                    <a href="#" title="GitHub">
                        <i class="fab fa-github"></i>
                    </a>
                </div>
            </form>

            <!-- Footer -->
            <div class="login-footer">
                <p>Don't have an account? <a href="#">Sign Up</a></p>
            </div>

        </div>
    </div>

    <script>
        // ==========================================
        // TOGGLE PASSWORD VISIBILITY
        // ==========================================
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function() {
            // Toggle the type attribute
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);

            // Toggle the icon
            const icon = this.querySelector('i');
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        });

        // ==========================================
        // HANDLE LOGIN
        // ==========================================
        function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const rememberMe = document.getElementById('rememberMe').checked;

            // Simple validation
            if (email === '' || password === '') {
                errorText.textContent = 'Please fill in all fields';
                errorMessage.classList.add('show');
                return;
            }

            // Demo credentials
            if (email === 'demo@emergency.com' && password === 'password123') {
                errorMessage.classList.remove('show');
                
                // Save remember me preference
                if (rememberMe) {
                    localStorage.setItem('rememberMe', 'true');
                    localStorage.setItem('userEmail', email);
                } else {
                    localStorage.removeItem('rememberMe');
                    localStorage.removeItem('userEmail');
                }
                
                // Redirect to home page
                window.location.href = 'index.html';
            } else {
                errorText.textContent = 'Invalid email or password. Try demo@emergency.com / password123';
                errorMessage.classList.add('show');
            }
        }

        // ==========================================
        // REAL-TIME VALIDATION
        // ==========================================
        document.querySelectorAll('#loginForm input').forEach(input => {
            input.addEventListener('input', () => {
                document.getElementById('errorMessage').classList.remove('show');
            });
        });

        // ==========================================
        // AUTO-FILL REMEMBERED EMAIL
        // ==========================================
        window.addEventListener('DOMContentLoaded', function() {
            if (localStorage.getItem('rememberMe') === 'true') {
                const email = localStorage.getItem('userEmail');
                if (email) {
                    document.getElementById('email').value = email;
                    document.getElementById('rememberMe').checked = true;
                }
            }
        });
    </script>
</body>
</html>
