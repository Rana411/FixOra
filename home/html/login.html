<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Fixora</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        /* ===== LOGIN PAGE ===== */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            padding: 20px;
        }

        .login-container {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 45px 40px;
            max-width: 460px;
            width: 100%;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: background 0.4s, box-shadow 0.4s;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 300px;
            height: 300px;
            background: var(--gradient-primary);
            opacity: 0.05;
            border-radius: 50%;
            pointer-events: none;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .login-header .logo-icon {
            font-size: 3rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .login-header h1 {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .login-form {
            position: relative;
            z-index: 1;
        }

        /* ===== ROLE SELECTOR ===== */
        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .role-option {
            padding: 16px 12px;
            border: 2px solid var(--border);
            border-radius: 14px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: var(--bg-primary);
        }

        .role-option:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .role-option.active {
            border-color: var(--accent);
            background: rgba(102, 126, 234, 0.08);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .role-option i {
            font-size: 2rem;
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            transition: 0.3s;
        }

        .role-option.active i {
            color: var(--accent);
        }

        .role-option .role-title {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-primary);
            display: block;
        }

        .role-option .role-desc {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-light);
            display: block;
            margin-top: 2px;
        }

        .role-option.active .role-desc {
            color: var(--accent);
        }

        .role-option input[type="radio"] {
            display: none;
        }

        /* ===== FORM FIELDS ===== */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .form-group .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-group .input-wrapper .input-icon {
            position: absolute;
            left: 16px;
            color: var(--text-light);
            font-size: 1rem;
            transition: 0.3s;
            pointer-events: none;
        }

        .form-group .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: var(--transition);
            outline: none;
        }

        .form-group .input-wrapper input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.12);
        }

        .form-group .input-wrapper input:focus ~ .input-icon {
            color: var(--accent);
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 8px;
            transition: var(--transition);
            border-radius: 8px;
        }

        .password-toggle:hover {
            color: var(--accent);
            background: rgba(102, 126, 234, 0.08);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .form-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .form-options label input[type="checkbox"] {
            accent-color: var(--accent);
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .form-options a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .form-options a:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.5);
        }

        .login-footer {
            text-align: center;
            margin-top: 22px;
            position: relative;
            z-index: 1;
        }

        .login-footer p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .login-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 18px 0 22px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            color: var(--text-light);
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
        }

        .social-login {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .social-login a {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: var(--transition);
            font-size: 1.1rem;
            text-decoration: none;
        }

        .social-login a:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }

        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .error-message.show {
            display: flex;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            .login-header h1 {
                font-size: 1.4rem;
            }
            .role-selector {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            .role-option {
                padding: 14px 8px;
            }
            .role-option i {
                font-size: 1.6rem;
            }
            .form-options {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-container">

            <!-- Header -->
            <div class="login-header">
                <div class="logo-icon">
                    <i class="fas fa-wrench"></i>
                </div>
                <h1>Welcome to Fixora</h1>
                <p>Sign in to book services or manage repairs</p>
            </div>

            <!-- Login Form -->
            <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
                
                <!-- Error Message -->
                <div class="error-message" id="errorMessage">
                    <i class="fas fa-circle-exclamation"></i>
                    <span id="errorText">Invalid email or password</span>
                </div>

                <!-- ===== ROLE SELECTOR (بدون علامة الصح) ===== -->
                <div class="role-selector">
                    <label class="role-option active" id="customerRole">
                        <input type="radio" name="role" value="customer" checked />
                        <i class="fas fa-user"></i>
                        <span class="role-title">Customer</span>
                        <span class="role-desc">Book Services</span>
                    </label>
                    <label class="role-option" id="providerRole">
                        <input type="radio" name="role" value="provider" />
                        <i class="fas fa-user-tie"></i>
                        <span class="role-title">Provider</span>
                        <span class="role-desc">Manage Repairs</span>
                    </label>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="you@example.com" required />
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required />
                        <i class="fas fa-lock input-icon"></i>
                        <button type="button" class="password-toggle" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Options -->
                <div class="form-options">
                    <label>
                        <input type="checkbox" id="rememberMe" checked />
                        Remember me
                    </label>
                    <a href="#">Forgot password?</a>
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn-login">
                    <i class="fas fa-arrow-right-to-bracket"></i>
                    Sign In
                </button>

                <!-- Divider -->
                <div class="divider">
                    <span>or continue with</span>
                </div>

                <!-- Social Login -->
                <div class="social-login">
                    <a href="#"><i class="fab fa-google"></i></a>
                    <a href="#"><i class="fab fa-apple"></i></a>
                    <a href="#"><i class="fab fa-github"></i></a>
                </div>
            </form>

            <!-- Footer -->
            <div class="login-footer">
                <p>Don't have an account? <a href="#">Sign Up</a></p>
            </div>

        </div>
    </div>

    <script>
        // ==========================================
        // ROLE SELECTOR
        // ==========================================
        const customerRole = document.getElementById('customerRole');
        const providerRole = document.getElementById('providerRole');

        customerRole.addEventListener('click', function() {
            this.classList.add('active');
            providerRole.classList.remove('active');
            document.querySelector('input[name="role"][value="customer"]').checked = true;
        });

        providerRole.addEventListener('click', function() {
            this.classList.add('active');
            customerRole.classList.remove('active');
            document.querySelector('input[name="role"][value="provider"]').checked = true;
        });

        // ==========================================
        // TOGGLE PASSWORD
        // ==========================================
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            const icon = this.querySelector('i');
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        });

        // ==========================================
        // HANDLE LOGIN
        // ==========================================
        function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const rememberMe = document.getElementById('rememberMe').checked;

            // Get selected role
            const role = document.querySelector('input[name="role"]:checked').value;

            if (email === '' || password === '') {
                errorText.textContent = 'Please fill in all fields';
                errorMessage.classList.add('show');
                return;
            }

            // Demo credentials
            const validCustomer = email === 'demo@fixora.com' && password === 'password123';
            const validProvider = email === 'provider@fixora.com' && password === 'provider123';

            if (validCustomer || validProvider) {
                errorMessage.classList.remove('show');
                
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userRole', role);
                localStorage.setItem('userEmail', email);
                
                if (rememberMe) {
                    localStorage.setItem('rememberMe', 'true');
                }
                
                if (role === 'customer') {
                    window.location.href = 'customer-dashboard.html';
                } else if (role === 'provider') {
                    window.location.href = 'provider-dashboard.html';
                }
            } else {
                errorText.textContent = 'Invalid credentials. Try: demo@fixora.com / password123 or provider@fixora.com / provider123';
                errorMessage.classList.add('show');
            }
        }

        // ==========================================
        // REAL-TIME VALIDATION
        // ==========================================
        document.querySelectorAll('#loginForm input').forEach(input => {
            input.addEventListener('input', () => {
                document.getElementById('errorMessage').classList.remove('show');
            });
        });

        // ==========================================
        // AUTO-FILL REMEMBERED EMAIL
        // ==========================================
        window.addEventListener('DOMContentLoaded', function() {
            if (localStorage.getItem('rememberMe') === 'true') {
                const email = localStorage.getItem('userEmail');
                if (email) {
                    document.getElementById('email').value = email;
                    document.getElementById('rememberMe').checked = true;
                }
            }
        });
    </script>
</body>
</html>
