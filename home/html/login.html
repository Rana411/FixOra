<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Fixora</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        /* ==========================================
           RESET
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: #f5f4f7;
            position: relative;
            overflow-y: auto;
        }

        /* ==========================================
           خلفية زاهية - ألوان مشرقة
           ========================================== */
        .vibrant-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        /* ===== 1. دوائر كبيرة زاهية ===== */
        .vibrant-bg .circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            animation: vibrantFloat 22s ease-in-out infinite;
        }

        .vibrant-bg .circle:nth-child(1) {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #ff6b6b, #ee5a24);
            top: -200px;
            right: -150px;
            animation-duration: 28s;
            opacity: 0.12;
        }

        .vibrant-bg .circle:nth-child(2) {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #a17413, #ad912b);
            bottom: -150px;
            left: -120px;
            animation-duration: 24s;
            animation-delay: 2s;
            opacity: 0.1;
        }

        .vibrant-bg .circle:nth-child(3) {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #48dbfb, #0abde3);
            top: 30%;
            right: -5%;
            animation-duration: 20s;
            animation-delay: 4s;
            opacity: 0.08;
        }

        .vibrant-bg .circle:nth-child(4) {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #ff9ff3, #f368e0);
            bottom: 20%;
            left: -5%;
            animation-duration: 26s;
            animation-delay: 1s;
            opacity: 0.1;
        }

        .vibrant-bg .circle:nth-child(5) {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #54a0ff, #2e86de);
            top: 10%;
            left: 40%;
            animation-duration: 18s;
            animation-delay: 3s;
            opacity: 0.09;
        }

        .vibrant-bg .circle:nth-child(6) {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #ff6b6b, #ee5a24);
            bottom: 30%;
            right: 20%;
            animation-duration: 22s;
            animation-delay: 5s;
            opacity: 0.07;
        }

        /* ===== 2. جسيمات متلألئة ===== */
        .vibrant-bg .sparkle {
            position: absolute;
            border-radius: 50%;
            background: white;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            animation: sparkleFloat 12s ease-in-out infinite;
        }

        .vibrant-bg .sparkle:nth-child(7) {
            width: 6px;
            height: 6px;
            top: 15%;
            left: 10%;
            animation-duration: 10s;
            animation-delay: 0s;
            background: #ff6b6b;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.4);
        }

        .vibrant-bg .sparkle:nth-child(8) {
            width: 8px;
            height: 8px;
            top: 70%;
            right: 15%;
            animation-duration: 14s;
            animation-delay: 2s;
            background: #67bfd1;
            box-shadow: 0 0 20px rgba(254, 202, 87, 0.4);
        }

        .vibrant-bg .sparkle:nth-child(9) {
            width: 5px;
            height: 5px;
            top: 40%;
            left: 85%;
            animation-duration: 11s;
            animation-delay: 4s;
            background: #48dbfb;
            box-shadow: 0 0 20px rgba(72, 219, 251, 0.4);
        }

        .vibrant-bg .sparkle:nth-child(10) {
            width: 7px;
            height: 7px;
            top: 80%;
            left: 20%;
            animation-duration: 13s;
            animation-delay: 1s;
            background: #82557c;
            box-shadow: 0 0 20px rgba(255, 159, 243, 0.4);
        }

        .vibrant-bg .sparkle:nth-child(11) {
            width: 4px;
            height: 4px;
            top: 25%;
            right: 30%;
            animation-duration: 9s;
            animation-delay: 3s;
            background: #54a0ff;
            box-shadow: 0 0 20px rgba(84, 160, 255, 0.4);
        }

        .vibrant-bg .sparkle:nth-child(12) {
            width: 9px;
            height: 9px;
            top: 55%;
            left: 50%;
            animation-duration: 15s;
            animation-delay: 5s;
            background: #ff6b6b;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.4);
        }

        .vibrant-bg .sparkle:nth-child(13) {
            width: 5px;
            height: 5px;
            top: 10%;
            right: 50%;
            animation-duration: 12s;
            animation-delay: 2.5s;
            background: #feca57;
            box-shadow: 0 0 20px rgba(254, 202, 87, 0.4);
        }

        .vibrant-bg .sparkle:nth-child(14) {
            width: 6px;
            height: 6px;
            top: 65%;
            left: 70%;
            animation-duration: 16s;
            animation-delay: 4.5s;
            background: #48dbfb;
            box-shadow: 0 0 20px rgba(72, 219, 251, 0.4);
        }

        /* ===== 3. بقع ضوئية ===== */
        .vibrant-bg .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.08;
            animation: glowFloat 15s ease-in-out infinite;
        }

        .vibrant-bg .glow:nth-child(15) {
            width: 200px;
            height: 200px;
            background: #ff6b6b;
            top: 20%;
            left: 5%;
            animation-duration: 18s;
        }

        .vibrant-bg .glow:nth-child(16) {
            width: 150px;
            height: 150px;
            background: #48dbfb;
            bottom: 15%;
            right: 10%;
            animation-duration: 14s;
            animation-delay: 3s;
        }

        .vibrant-bg .glow:nth-child(17) {
            width: 180px;
            height: 180px;
            background: #ff9ff3;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-duration: 20s;
            animation-delay: 5s;
        }

        /* ===== حركات ===== */
        @keyframes vibrantFloat {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 0.08;
            }
            25% {
                transform: translate(40px, -30px) scale(1.15) rotate(45deg);
                opacity: 0.15;
            }
            50% {
                transform: translate(-25px, 25px) scale(0.85) rotate(90deg);
                opacity: 0.08;
            }
            75% {
                transform: translate(20px, -15px) scale(1.08) rotate(135deg);
                opacity: 0.12;
            }
            100% {
                transform: translate(0, 0) scale(1) rotate(180deg);
                opacity: 0.08;
            }
        }

        @keyframes sparkleFloat {
            0%, 100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.3;
            }
            25% {
                transform: translate(30px, -25px) scale(1.8);
                opacity: 1;
            }
            50% {
                transform: translate(-20px, 20px) scale(0.5);
                opacity: 0.2;
            }
            75% {
                transform: translate(15px, -10px) scale(1.5);
                opacity: 0.8;
            }
        }

        @keyframes glowFloat {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 0.05;
            }
            50% {
                transform: translate(30px, -30px) scale(1.3);
                opacity: 0.12;
            }
            100% {
                transform: translate(-20px, 20px) scale(0.8);
                opacity: 0.05;
            }
        }

        /* ==========================================
           CONTAINER - شفاف مع خلفية زاهية
           ========================================== */
        .login-container {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 32px;
            padding: 50px 45px;
            max-width: 440px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.06), 
                        0 10px 30px rgba(0, 0, 0, 0.02),
                        inset 0 1px 0 rgba(255, 255, 255, 0.5);
            position: relative;
            z-index: 1;
            animation: slideIn 0.8s ease forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ===== HEADER ===== */
        .login-header {
            text-align: center;
            margin-bottom: 34px;
        }

        .login-header .logo-wrapper {
            width: 72px;
            height: 72px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.04);
            animation: logoPulse 3s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
        }

        .login-header .logo-wrapper i {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #1a202c;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .login-header p {
            color: rgba(26, 32, 44, 0.5);
            font-size: 0.95rem;
        }

        /* ===== FORM ===== */
        .login-form {
            position: relative;
        }

        /* Role Selector */
        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 28px;
        }

        .role-option {
            padding: 16px 12px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .role-option:hover {
            border-color: rgba(102, 126, 234, 0.3);
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.35);
        }

        .role-option.active {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.45);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.06);
        }

        .role-option i {
            font-size: 2rem;
            display: block;
            margin-bottom: 6px;
            color: rgba(26, 32, 44, 0.25);
            transition: 0.3s;
        }

        .role-option.active i {
            color: #667eea;
        }

        .role-option .role-title {
            font-weight: 700;
            font-size: 1rem;
            color: #1a202c;
            display: block;
        }

        .role-option .role-desc {
            font-size: 0.7rem;
            font-weight: 500;
            color: rgba(26, 32, 44, 0.35);
            display: block;
            margin-top: 2px;
        }

        .role-option.active .role-desc {
            color: #667eea;
        }

        .role-option input[type="radio"] {
            display: none;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            color: rgba(26, 32, 44, 0.6);
            margin-bottom: 6px;
        }

        .form-group .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-group .input-wrapper .input-icon {
            position: absolute;
            left: 16px;
            color: rgba(26, 32, 44, 0.25);
            font-size: 1rem;
            transition: 0.3s;
            pointer-events: none;
        }

        .form-group .input-wrapper input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            color: #1a202c;
            transition: 0.3s;
            outline: none;
        }

        .form-group .input-wrapper input::placeholder {
            color: rgba(26, 32, 44, 0.2);
        }

        .form-group .input-wrapper input:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.35);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.04);
        }

        .form-group .input-wrapper input:focus ~ .input-icon {
            color: #667eea;
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            background: none;
            border: none;
            color: rgba(26, 32, 44, 0.25);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 8px;
            transition: 0.3s;
            border-radius: 8px;
        }

        .password-toggle:hover {
            color: #667eea;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Form Options */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 26px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .form-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: rgba(26, 32, 44, 0.5);
            cursor: pointer;
        }

        .form-options label input[type="checkbox"] {
            accent-color: #667eea;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .form-options a {
            color: #667eea;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .form-options a:hover {
            color: #5a67d8;
            text-decoration: underline;
        }

        /* Login Button */
        .btn-login {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.2);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .btn-login::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255, 255, 255, 0.15) 50%,
                transparent 70%
            );
            animation: shimmerBtn 4s infinite;
            transform: rotate(45deg);
        }

        @keyframes shimmerBtn {
            0% {
                transform: translateX(-100%) rotate(45deg);
            }
            100% {
                transform: translateX(100%) rotate(45deg);
            }
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 22px 0 24px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.4);
        }

        .divider span {
            color: rgba(26, 32, 44, 0.25);
            font-size: 0.8rem;
            font-weight: 500;
            white-space: nowrap;
        }

        /* Social Login */
        .social-login {
            display: flex;
            gap: 14px;
            justify-content: center;
        }

        .social-login a {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(26, 32, 44, 0.25);
            transition: all 0.3s ease;
            font-size: 1.2rem;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .social-login a:hover {
            border-color: #667eea;
            color: #667eea;
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.3);
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 26px;
        }

        .login-footer p {
            color: rgba(26, 32, 44, 0.35);
            font-size: 0.9rem;
        }

        .login-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }

        .login-footer a:hover {
            color: #5a67d8;
            text-decoration: underline;
        }

        /* Error Message */
        .error-message {
            background: rgba(229, 62, 62, 0.06);
            color: #e53e3e;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 18px;
            display: none;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(229, 62, 62, 0.08);
            backdrop-filter: blur(5px);
        }

        .error-message.show {
            display: flex;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-8px);
            }
            75% {
                transform: translateX(8px);
            }
        }

        /* ==========================================
           RESPONSIVE
           ========================================== */
        @media (max-width: 480px) {
            .login-container {
                padding: 32px 24px;
                border-radius: 24px;
            }
            .login-header h1 {
                font-size: 1.6rem;
            }
            .login-header .logo-wrapper {
                width: 60px;
                height: 60px;
            }
            .login-header .logo-wrapper i {
                font-size: 1.8rem;
            }
            .role-selector {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            .role-option {
                padding: 12px 8px;
            }
            .role-option i {
                font-size: 1.6rem;
            }
            .form-options {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <!-- ===== خلفية زاهية ===== -->
    <div class="vibrant-bg">
        <!-- دوائر كبيرة -->
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>

        <!-- جسيمات متلألئة -->
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>

        <!-- بقع ضوئية -->
        <div class="glow"></div>
        <div class="glow"></div>
        <div class="glow"></div>
    </div>

    <!-- ===== CONTAINER ===== -->
    <div class="login-container">

        <!-- Header -->
        <div class="login-header">
            <div class="logo-wrapper">
                <i class="fas fa-wrench"></i>
            </div>
            <h1>Welcome Back</h1>
            <p>Sign in to manage your repairs</p>
        </div>

        <!-- Login Form -->
        <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">

            <!-- Error Message -->
            <div class="error-message" id="errorMessage">
                <i class="fas fa-circle-exclamation"></i>
                <span id="errorText">Invalid email or password</span>
            </div>

            <!-- Role Selector -->
            <div class="role-selector">
                <label class="role-option active" id="customerRole">
                    <input type="radio" name="role" value="customer" checked />
                    <i class="fas fa-user"></i>
                    <span class="role-title">Customer</span>
                    <span class="role-desc">Book Services</span>
                </label>
                <label class="role-option" id="providerRole">
                    <input type="radio" name="role" value="provider" />
                    <i class="fas fa-user-tie"></i>
                    <span class="role-title">Provider</span>
                    <span class="role-desc">Manage Repairs</span>
                </label>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="you@example.com" required />
                    <i class="fas fa-envelope input-icon"></i>
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required />
                    <i class="fas fa-lock input-icon"></i>
                    <button type="button" class="password-toggle" id="togglePassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Options -->
            <div class="form-options">
                <label>
                    <input type="checkbox" id="rememberMe" checked />
                    Remember me
                </label>
                <a href="#">Forgot password?</a>
            </div>

            <!-- Login Button -->
            <button type="submit" class="btn-login">
                <i class="fas fa-arrow-right-to-bracket"></i> Sign In
            </button>

            <!-- Divider -->
            <div class="divider">
                <span>or continue with</span>
            </div>

            <!-- Social Login -->
            <div class="social-login">
                <a href="#"><i class="fab fa-google"></i></a>
                <a href="#"><i class="fab fa-apple"></i></a>
                <a href="#"><i class="fab fa-github"></i></a>
            </div>
        </form>

        <!-- Footer -->
        <div class="login-footer">
            <p>Don't have an account? <a href="#">Sign Up</a></p>
        </div>

    </div>

    <script>
        // ==========================================
        // ROLE SELECTOR
        // ==========================================
        const customerRole = document.getElementById('customerRole');
        const providerRole = document.getElementById('providerRole');

        customerRole.addEventListener('click', function() {
            this.classList.add('active');
            providerRole.classList.remove('active');
            document.querySelector('input[name="role"][value="customer"]').checked = true;
        });

        providerRole.addEventListener('click', function() {
            this.classList.add('active');
            customerRole.classList.remove('active');
            document.querySelector('input[name="role"][value="provider"]').checked = true;
        });

        // ==========================================
        // TOGGLE PASSWORD
        // ==========================================
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            const icon = this.querySelector('i');
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        });

        // ==========================================
        // HANDLE LOGIN
        // ==========================================
        function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const rememberMe = document.getElementById('rememberMe').checked;

            const role = document.querySelector('input[name="role"]:checked').value;

            if (email === '' || password === '') {
                errorText.textContent = 'Please fill in all fields';
                errorMessage.classList.add('show');
                return;
            }

            const validCustomer = email === 'demo@fixora.com' && password === 'password123';
            const validProvider = email === 'provider@fixora.com' && password === 'provider123';

            if (validCustomer || validProvider) {
                errorMessage.classList.remove('show');

                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userRole', role);
                localStorage.setItem('userEmail', email);

                if (rememberMe) {
                    localStorage.setItem('rememberMe', 'true');
                }

                if (role === 'customer') {
                    window.location.href = 'customer-dashboard.html';
                } else if (role === 'provider') {
                    window.location.href = 'provider-dashboard.html';
                }
            } else {
                errorText.textContent = 'Invalid credentials. Try: demo@fixora.com / password123 or provider@fixora.com / provider123';
                errorMessage.classList.add('show');
            }
        }

        // ==========================================
        // REAL-TIME VALIDATION
        // ==========================================
        document.querySelectorAll('#loginForm input').forEach(input => {
            input.addEventListener('input', () => {
                document.getElementById('errorMessage').classList.remove('show');
            });
        });

        // ==========================================
        // AUTO-FILL REMEMBERED EMAIL
        // ==========================================
        window.addEventListener('DOMContentLoaded', function() {
            if (localStorage.getItem('rememberMe') === 'true') {
                const email = localStorage.getItem('userEmail');
                if (email) {
                    document.getElementById('email').value = email;
                    document.getElementById('rememberMe').checked = true;
                }
            }
        });
    </script>

</body>
</html>
