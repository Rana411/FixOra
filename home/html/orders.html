<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orders - Fixora</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        /* ===== STATUS BADGES ===== */
        .status-badge {
            padding: 4px 14px;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-block;
        }
        .status-pending { background: #fef3c7; color: #b45309; }
        .status-progress { background: #dbeafe; color: #1e40af; }
        .status-scheduled { background: #e0e7ff; color: #4338ca; }
        .status-completed { background: #d1fae5; color: #065f46; }
        .status-cancelled { background: #fee2e2; color: #991b1b; }

        .action-btn {
            padding: 6px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
        }
        .action-btn:hover { transform: scale(1.05); }
        .btn-accept { background: var(--accent); color: white; }
        .btn-complete { background: #48bb78; color: white; }
        .btn-start { background: var(--accent); color: white; }
        .btn-cancel { background: #ef4444; color: white; }
        .btn-done { background: #9ca3af; color: white; cursor: default; }

        .filter-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .filter-btn {
            padding: 8px 20px;
            border: 2px solid var(--border);
            border-radius: 60px;
            background: var(--bg-primary);
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
        }
        .filter-btn:hover,
        .filter-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(102, 126, 234, 0.08);
        }
        .filter-btn.active {
            background: var(--accent);
            color: white;
        }

        .table-wrapper {
            overflow-x: auto;
        }
        .orders-table {
            width: 100%;
            border-collapse: collapse;
        }
        .orders-table th {
            text-align: left;
            padding: 12px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.85rem;
            border-bottom: 2px solid var(--border);
        }
        .orders-table td {
            padding: 14px 12px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }
        .orders-table tr:hover {
            background: var(--bg-primary);
        }
        .orders-table .order-id {
            color: var(--text-primary);
            font-weight: 700;
        }
        .orders-table .customer-name {
            color: var(--text-primary);
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        .empty-state i {
            font-size: 3rem;
            color: var(--border);
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-wrench"></i>
                <span>Fix<span class="logo-highlight">ora</span></span>
            </div>
            <ul class="nav-links" id="navLinks">
                <li><a href="../html/provider-dashboard.html"><i class="fas fa-gauge-high"></i> Dashboard</a></li>
                <li><a href="../html/orders.html" class="active"><i class="fas fa-list-check"></i> Orders</a></li>
                <li><a href="../html/schedule.html"><i class="fas fa-calendar-days"></i> Schedule</a></li>
                <li><a href="../html/profile.html"><i class="fas fa-user-gear"></i> Profile</a></li>
                <li id="authLink"><a href="../html/login.html" onclick="handleLogout(event)"><i class="fas fa-right-from-bracket"></i> Logout</a></li>
            </ul>
            <div class="nav-actions">
                <button id="theme-toggle" class="theme-btn">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="hamburger" id="hamburger">
                    <i class="fas fa-bars"></i>
                </div>
            </div>
        </div>
    </nav>

    <!-- ===== MAIN ===== -->
    <main class="main-content">
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 24px;">
                <h1 class="page-title" style="margin-bottom: 0;">
                    <i class="fas fa-list-check"></i> Orders
                </h1>
                <span style="color: var(--text-secondary); font-weight: 500;">
                    <i class="fas fa-clock"></i> Total: <span id="orderCount">0</span> orders
                </span>
            </div>

            <!-- Filter Bar -->
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="pending">Pending</button>
                <button class="filter-btn" data-filter="in-progress">In Progress</button>
                <button class="filter-btn" data-filter="scheduled">Scheduled</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <!-- Orders Table -->
            <div style="background: var(--bg-card); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); border: 1px solid var(--border);">
                <div class="table-wrapper">
                    <table class="orders-table" id="ordersTable">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer</th>
                                <th>Service</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="ordersBody">
                            <!-- Rows will be inserted by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <p>© 2026 <strong>Fixora</strong> — Professional Home Repair Services</p>
        <p class="footer-update">Last updated: <span id="footer-date"></span></p>
    </footer>

    <script src="../js/script.js"></script>
    <script>
        // ===== ORDERS DATA =====
        let orders = [
            { id: '#ORD-001', customer: 'Ahmed Al-Saud', service: 'Plumbing', status: 'pending', date: '2026-07-08' },
            { id: '#ORD-002', customer: 'Fatima Al-Zahra', service: 'Electrical', status: 'in-progress', date: '2026-07-07' },
            { id: '#ORD-003', customer: 'Mohammed Al-Otaibi', service: 'AC Repair', status: 'scheduled', date: '2026-07-09' },
            { id: '#ORD-004', customer: 'Nora Al-Fahd', service: 'Carpentry', status: 'completed', date: '2026-07-06' },
            { id: '#ORD-005', customer: 'Sultan Al-Ghamdi', service: 'Painting', status: 'pending', date: '2026-07-08' },
            { id: '#ORD-006', customer: 'Maha Al-Saud', service: 'Plumbing', status: 'scheduled', date: '2026-07-10' },
            { id: '#ORD-007', customer: 'Faisal Al-Otaibi', service: 'Electrical', status: 'completed', date: '2026-07-05' },
            { id: '#ORD-008', customer: 'Layla Al-Zahra', service: 'AC Repair', status: 'pending', date: '2026-07-08' },
        ];

        let currentFilter = 'all';

        // ===== RENDER ORDERS =====
        function renderOrders(filter = 'all') {
            const tbody = document.getElementById('ordersBody');
            const filtered = filter === 'all' ? orders : orders.filter(o => o.status === filter);
            
            document.getElementById('orderCount').textContent = filtered.length;

            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6">
                            <div class="empty-state">
                                <i class="fas fa-inbox"></i>
                                <p style="font-weight: 600; color: var(--text-secondary);">No orders found</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            let html = '';
            filtered.forEach(order => {
                const statusClass = {
                    'pending': 'status-pending',
                    'in-progress': 'status-progress',
                    'scheduled': 'status-scheduled',
                    'completed': 'status-completed',
                    'cancelled': 'status-cancelled'
                }[order.status] || 'status-pending';

                const statusLabels = {
                    'pending': 'Pending',
                    'in-progress': 'In Progress',
                    'scheduled': 'Scheduled',
                    'completed': '✅ Completed',
                    'cancelled': '❌ Cancelled'
                };

                const actionHtml = getActionHtml(order);

                html += `
                    <tr>
                        <td class="order-id">${order.id}</td>
                        <td class="customer-name">${order.customer}</td>
                        <td><i class="fas ${getServiceIcon(order.service)}" style="color: var(--accent);"></i> ${order.service}</td>
                        <td><span class="status-badge ${statusClass}">${statusLabels[order.status] || order.status}</span></td>
                        <td>${order.date}</td>
                        <td>${actionHtml}</td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        // ===== GET ACTION BUTTON =====
        function getActionHtml(order) {
            const actions = {
                'pending': `<button class="action-btn btn-accept" onclick="acceptOrder('${order.id}')">Accept</button>`,
                'in-progress': `<button class="action-btn btn-complete" onclick="completeOrder('${order.id}')">Complete</button>`,
                'scheduled': `<button class="action-btn btn-start" onclick="startOrder('${order.id}')">Start</button>`,
                'completed': `<button class="action-btn btn-done" disabled>✓ Done</button>`,
                'cancelled': `<button class="action-btn btn-done" disabled>✗ Cancelled</button>`
            };
            return actions[order.status] || actions.pending;
        }

        // ===== SERVICE ICON =====
        function getServiceIcon(service) {
            const icons = {
                'Plumbing': 'fa-faucet',
                'Electrical': 'fa-bolt',
                'AC Repair': 'fa-snowflake',
                'Carpentry': 'fa-hammer',
                'Painting': 'fa-paint-roller',
                'Masonry': 'fa-trowel'
            };
            return icons[service] || 'fa-wrench';
        }

        // ===== ORDER ACTIONS =====
        function acceptOrder(orderId) {
            if (confirm(`Accept order ${orderId}?`)) {
                const order = orders.find(o => o.id === orderId);
                if (order) {
                    order.status = 'in-progress';
                    renderOrders(currentFilter);
                    alert(`✅ Order ${orderId} accepted!`);
                }
            }
        }

        function completeOrder(orderId) {
            if (confirm(`Mark order ${orderId} as complete?`)) {
                const order = orders.find(o => o.id === orderId);
                if (order) {
                    order.status = 'completed';
                    renderOrders(currentFilter);
                    alert(`✅ Order ${orderId} completed!`);
                }
            }
        }

        function startOrder(orderId) {
            if (confirm(`Start working on order ${orderId}?`)) {
                const order = orders.find(o => o.id === orderId);
                if (order) {
                    order.status = 'in-progress';
                    renderOrders(currentFilter);
                    alert(`🔧 Order ${orderId} started!`);
                }
            }
        }

        // ===== FILTER BUTTONS =====
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderOrders(currentFilter);
            });
        });

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', function() {
            // Check if provider is logged in
            const role = localStorage.getItem('userRole');
            if (role !== 'provider') {
                window.location.href = 'login.html';
            }
            renderOrders('all');
        });
    </script>
</body>
</html>
